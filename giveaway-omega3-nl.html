<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omega-3 & De Perimenopauze — Gratis Gids</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --mauve: #9A5672; --aubergine: #6A374C; --steel: #79A1B5;
    --offwhite: #F0EEE8; --peach: #E0A880; --lightblue: #C4E5E9;
    --coral: #E08781; --pink: #D78496; --text: #2d2d2d;
  }
  body {
    font-family: 'Poppins', sans-serif;
    font-size: 14px; line-height: 1.65;
    color: var(--text); background: var(--offwhite);
  }
  .page {
    width: 210mm; min-height: 297mm; margin: 0 auto;
    background: white; position: relative; overflow: hidden;
    page-break-after: always;
  }
  @media screen {
    .page { margin: 20px auto; box-shadow: 0 4px 30px rgba(0,0,0,.12); }
  }
  @media print {
    body { background: white; }
    .no-print { display: none !important; }
  }
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;

  /* COVER */
  .cover {
    background: linear-gradient(150deg, #2a5a7a 0%, var(--steel) 50%, var(--lightblue) 100%);
    height: 297mm; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 50px; text-align: center; position: relative;
  }
  .cover::before {
    content: ''; position: absolute; top: -80px; right: -80px;
    width: 280px; height: 280px; background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .cover::after {
    content: ''; position: absolute; bottom: -60px; left: -60px;
    width: 220px; height: 220px; background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .cover-badge {
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);
    color: white; font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; padding: 8px 22px; border-radius: 30px; margin-bottom: 40px;
  }
  .omega-symbol {
    font-size: 120px; font-weight: 600;
    color: rgba(255,255,255,0.12); line-height: 1; margin-bottom: 10px;
  }
  .cover-title {
    font-size: 36px; font-weight: 600; color: white;
    line-height: 1.2; margin-bottom: 16px; position: relative; z-index: 1;
  }
  .cover-title span { color: var(--peach); }
  .cover-subtitle {
    font-size: 17px; font-weight: 300; color: rgba(255,255,255,0.85);
    line-height: 1.5; margin-bottom: 50px; max-width: 420px;
  }
  .cover-line {
    width: 60px; height: 3px; background: var(--peach);
    border-radius: 2px; margin: 0 auto 50px;
  }
  .cover-author { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 300; }
  .cover-author strong { font-weight: 600; color: white; }

  /* CONTENT PAGES */
  .content {
    padding: 55px 55px 50px; min-height: 297mm;
    display: flex; flex-direction: column;
  }
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1.5px solid var(--lightblue);
    padding-bottom: 14px; margin-bottom: 36px;
  }
  .page-header-brand {
    font-size: 11px; font-weight: 600; color: var(--steel);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .page-header-title { font-size: 11px; color: #999; font-style: italic; }

  .section-title {
    font-size: 22px; font-weight: 600; color: var(--aubergine);
    line-height: 1.25; margin-bottom: 8px;
  }
  .section-intro {
    font-size: 14px; color: #666; margin-bottom: 30px; max-width: 520px;
  }

  /* Fact boxes */
  .fact-box {
    border-left: 4px solid var(--steel); background: #f0f7fb;
    padding: 18px 22px; border-radius: 0 10px 10px 0; margin-bottom: 18px;
  }
  .fact-box .fact-num {
    font-size: 28px; font-weight: 700; color: var(--steel); line-height: 1;
  }
  .fact-box .fact-label {
    font-size: 13px; font-weight: 600; color: var(--aubergine); margin: 4px 0 6px;
  }
  .fact-box .fact-desc { font-size: 13px; color: #555; line-height: 1.5; }

  /* Benefit cards row */
  .benefits { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .benefit-card {
    background: linear-gradient(135deg, #f5fafa 0%, white 100%);
    border: 1.5px solid var(--lightblue); border-radius: 12px;
    padding: 18px 18px 16px;
  }
  .benefit-icon { font-size: 26px; margin-bottom: 8px; }
  .benefit-title { font-size: 13px; font-weight: 600; color: var(--aubergine); margin-bottom: 4px; }
  .benefit-desc { font-size: 12px; color: #666; line-height: 1.5; }

  /* Highlight callout */
  .callout {
    background: linear-gradient(135deg, var(--aubergine) 0%, var(--mauve) 100%);
    color: white; border-radius: 12px; padding: 24px 28px; margin: 24px 0;
  }
  .callout p { font-size: 15px; line-height: 1.6; }
  .callout p strong { font-weight: 600; }

  /* Source list */
  .source-item {
    display: flex; gap: 14px; margin-bottom: 14px;
    border-bottom: 1px solid #f0ece8; padding-bottom: 14px;
  }
  .source-dot {
    flex-shrink: 0; width: 28px; height: 28px; background: var(--lightblue);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--steel);
  }
  .source-text { font-size: 12.5px; color: #555; line-height: 1.5; }
  .source-text strong { color: var(--text); font-weight: 600; }

  /* CTA page */
  .cta-page {
    background: linear-gradient(160deg, var(--offwhite) 0%, white 40%, var(--lightblue) 100%);
    height: 297mm; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 55px; text-align: center;
  }
  .cta-page h2 { font-size: 28px; font-weight: 600; color: var(--aubergine); margin-bottom: 16px; }
  .cta-page p { font-size: 15px; color: #555; line-height: 1.7; max-width: 460px; margin-bottom: 32px; }
  .cta-box {
    background: linear-gradient(135deg, var(--aubergine) 0%, var(--mauve) 100%);
    color: white; border-radius: 14px; padding: 28px 36px; max-width: 400px; width: 100%;
    margin-bottom: 28px;
  }
  .cta-box .cta-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; }
  .cta-box .cta-product { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .cta-box .cta-desc { font-size: 13px; opacity: 0.85; line-height: 1.5; margin-bottom: 16px; }
  .cta-box .cta-url { font-size: 13px; font-weight: 500; color: var(--peach); }
  .cta-footer { font-size: 12px; color: #aaa; }
  .cta-footer strong { color: var(--mauve); }

  /* Print button (screen only) */
  .print-bar {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    display: flex; gap: 10px;
  }
  .print-bar button, .print-bar a {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px; border-radius: 10px;
    font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; text-decoration: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15); transition: opacity 0.15s;
  }
  .print-bar button { background: var(--steel); color: white; }
  .print-bar a { background: white; color: var(--aubergine); border: 1.5px solid var(--lightblue); }
  .print-bar button:hover, .print-bar a:hover { opacity: 0.85; }
  /* ── PRINT BUTTON ── */
  .print-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: linear-gradient(135deg, #9A5672, #6A374C);
    color: white; border: none; border-radius: 50px;
    padding: 14px 24px; font-family: 'Poppins', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(106,55,76,0.35);
    display: flex; align-items: center; gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .print-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(106,55,76,0.45); }
  @media print { .print-btn { display: none !important; } }
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">

  Download PDF
</button>

<!-- Print bar -->
<div class="print-bar no-print">
  <a href="../dashboard/">← Dashboard</a>
  <button onclick="window.print()">🖨 Opslaan als PDF</button>
</div>
