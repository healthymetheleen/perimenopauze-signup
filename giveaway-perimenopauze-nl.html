<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>7 Signalen van Perimenopauze — Gratis Gids</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --mauve: #9A5672;
    --aubergine: #6A374C;
    --steel: #79A1B5;
    --offwhite: #F0EEE8;
    --peach: #E0A880;
    --lightblue: #C4E5E9;
    --coral: #E08781;
    --pink: #D78496;
    --text: #2d2d2d;
  }
  body {
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    background: var(--offwhite);
  }
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    background: white;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }
  @media screen {
    .page { margin: 20px auto; box-shadow: 0 4px 30px rgba(0,0,0,.12); }
  }

  /* ── COVER ── */
  .cover {
    background: linear-gradient(150deg, var(--aubergine) 0%, var(--mauve) 60%, var(--peach) 100%);
    height: 297mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 50px;
    text-align: center;
    position: relative;
  }
  .cover::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 280px; height: 280px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .cover::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 220px; height: 220px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .cover-badge {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 22px;
    border-radius: 30px;
    margin-bottom: 40px;
  }
  .cover-number {
    font-size: 110px;
    font-weight: 600;
    color: rgba(255,255,255,0.15);
    line-height: 1;
    margin-bottom: 0px;
    position: relative;
    z-index: 1;
  }
  .cover-title {
    font-size: 36px;
    font-weight: 600;
    color: white;
    line-height: 1.2;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .cover-subtitle {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
    margin-bottom: 50px;
    max-width: 420px;
  }
  .cover-line {
    width: 60px;
    height: 3px;
    background: var(--peach);
    border-radius: 2px;
    margin: 0 auto 50px;
  }
  .cover-author {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
  }
  .cover-author strong {
    font-weight: 600;
    color: white;
  }

  /* ── CONTENT PAGES ── */
  .content {
    padding: 55px 55px 50px;
    min-height: 297mm;
    display: flex;
    flex-direction: column;
  }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--lightblue);
    padding-bottom: 14px;
    margin-bottom: 36px;
  }
  .page-header-brand {
    font-size: 11px;
    font-weight: 600;
    color: var(--mauve);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .page-header-title {
    font-size: 11px;
    color: #999;
    font-style: italic;
  }
  h1.section-title {
    font-size: 28px;
    font-weight: 600;
    color: var(--aubergine);
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .section-intro {
    font-size: 15px;
    color: #555;
    margin-bottom: 32px;
    font-weight: 300;
    line-height: 1.7;
  }
  .highlight-box {
    background: var(--offwhite);
    border-left: 4px solid var(--mauve);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 28px;
    font-size: 14px;
    line-height: 1.6;
  }
  .highlight-box strong {
    color: var(--aubergine);
  }

  /* Signal cards */
  .signal-card {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    background: white;
    border: 1.5px solid #f0eee8;
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(154,86,114,0.07);
  }
  .signal-number {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--mauve), var(--aubergine));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 700;
    color: white;
  }
  .signal-content h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--aubergine);
    margin-bottom: 4px;
  }
  .signal-content p {
    font-size: 13px;
    color: #666;
    line-height: 1.55;
  }
  .signal-tip {
    display: inline-block;
    background: var(--lightblue);
    color: var(--steel);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }

  /* Quick wins */
  .wins-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }
  .win-card {
    background: var(--offwhite);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .win-card h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--aubergine);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .win-icon {
    width: 24px;
    height: 24px;
    background: var(--mauve);
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
  }
  .win-card p {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }

  /* CTA page */
  .cta-page {
    background: linear-gradient(150deg, var(--aubergine) 0%, var(--mauve) 100%);
    min-height: 297mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 55px;
    text-align: center;
  }
  .cta-page h2 {
    font-size: 32px;
    font-weight: 600;
    color: white;
    line-height: 1.25;
    margin-bottom: 18px;
  }
  .cta-page p {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    font-weight: 300;
    line-height: 1.7;
    max-width: 420px;
    margin-bottom: 36px;
  }
  .cta-box {
    background: white;
    border-radius: 18px;
    padding: 32px 40px;
    max-width: 400px;
    width: 100%;
    margin-bottom: 32px;
  }
  .cta-box h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--aubergine);
    margin-bottom: 12px;
  }
  .cta-box p {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .cta-url {
    display: block;
    background: var(--coral);
    color: white;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 40px;
    text-decoration: none;
  }
  .author-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .author-avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 3px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 600;
    color: white;
  }
  .author-name {
    font-size: 14px;
    font-weight: 600;
    color: white;
  }
  .author-title {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 300;
  }

  .spacer { flex: 1; }
  .page-footer {
    border-top: 1px solid #eee;
    padding-top: 12px;
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #bbb;
  }
  /* ── PRINT BUTTON ── */
  .print-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: linear-gradient(135deg, #9A5672, #6A374C);
    color: white; border: none; border-radius: 50px;
    padding: 14px 24px; font-family: 'Poppins', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(106,55,76,0.35);
    display: flex; align-items: center; gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .print-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(106,55,76,0.45); }
  @media print { .print-btn { display: none !important; } }
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  Download PDF
</button>

<!-- COVER PAGE -->
<div class="page">
  <div class="cover">
    <div class="cover-badge">Gratis gids</div>
    <div class="cover-number">7</div>
    <h1 class="cover-title">Signalen dat jij<br>in de Perimenopauze bent</h1>
    <div class="cover-line"></div>
    <p class="cover-subtitle">En wat je er <em>nu al</em> aan kunt doen — praktisch, eerlijk, zonder fluff</p>
    <div class="cover-author">
